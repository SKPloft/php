name: Publish Statamic

# Image tags correspond to PHP version + OS variant (e.g. php8.5-alpine),
# NOT the Statamic release version. The actual Statamic app code is
# fetched via `composer create-project` on first container startup.
################################################################################
################################################################################

on:
  workflow_call:
    inputs:
      tag_prefix:
        required: false
        type: string
        default: ""
      build_all:
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 0 * * *"
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

################################################################################
################################################################################

jobs:

  prepare:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Warm up helper cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          . ./build/helpers.sh
          mkdir -p /tmp/helper_cache
          fetch_with_cache "https://api.github.com/repos/just-containers/s6-overlay/tags?per_page=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://api.github.com/repos/mlocati/docker-php-extension-installer/tags?per_page=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://api.github.com/repos/composer/composer/tags?per_page=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://registry.hub.docker.com/v2/repositories/library/debian/tags?&page_size=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://registry.hub.docker.com/v2/repositories/library/alpine/tags?&page_size=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://registry.hub.docker.com/v2/repositories/library/php/tags?&page_size=5" >/dev/null 2>&1 || true
          fetch_with_cache "https://registry.hub.docker.com/v2/repositories/shinsenter/laravel/tags?&page_size=5" >/dev/null 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: helper_cache
          path: /tmp/helper_cache/

  php-apps:
    needs: [prepare]

    uses: ./.github/workflows/template-php.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        app:
          # - app-bedrock
          # - app-cakephp4
          # - app-cakephp5
          # - app-codeigniter4
          # - app-coolify
          # - app-drupal
          # - app-espocrm
          # - app-flarum
          # - app-flightphp
          # - app-grav
          # - app-hyperf
          # - app-invoiceshelf
          # - app-kirby
          # - app-laminas
          # - app-laravel
          # - app-magento
          # - app-mautic
          # - app-phpmyadmin
          # - app-slim
          # - app-spiral
          - app-statamic
          # - app-sulu
          # - app-symfony
          # - app-wordpress
          # - app-yii
        # include:
        #   - app: app-laravel
        #     server: [apache, nginx]
    with:
      app_name: ${{ matrix.app }}
      server: ${{ matrix.server }}
      tag_prefix: ${{ inputs.tag_prefix }}
      build_all: ${{ inputs.build_all || false }}

################################################################################
################################################################################
